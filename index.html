<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在導向 iART auction...</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 9999; color: #666; font-size: 18px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loading">正在為您安全載入梅原龍三郎的檢索結果，請稍候...</div>

    <iframe id="iartFrame" src="https://live.ise-art.co.jp/catalog"></iframe>

    <script>
        var frame = document.getElementById('iartFrame');
        
        // 當官方網站載入完成後執行
        frame.onload = function() {
            try {
                // 1. 找到官網內部的搜尋輸入框
                var searchInput = frame.contentWindow.document.querySelector('input[placeholder*="検索"]');
                
                if (searchInput) {
                    // 2. 幫使用者自動打上「梅原」
                    searchInput.value = "梅原";
                    
                    // 3. 觸發輸入事件讓網站偵測到有打字
                    searchInput.dispatchEvent(new Event('input', { bubbles: true }));
                    
                    // 4. 0.3秒後自動按下 Enter 鍵觸發搜尋
                    setTimeout(function() {
                        var event = new KeyboardEvent('keydown', { 'key': 'Enter', 'bubbles': true });
                        searchInput.dispatchEvent(event);
                        
                        // 5. 搜尋完成後，關閉蓋在最上面的「請稍候」提示
                        document.getElementById('loading').style.display = 'none';
                    }, 300);
                } else {
                    // 如果因為防跨網域限制無法直接操作，0.5秒後直接隱藏提示讓使用者手動看網頁
                    setTimeout(function() { document.getElementById('loading').style.display = 'none'; }, 500);
                }
            } catch (e) {
                // 觸發安全機制時直接顯示官網網頁
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
